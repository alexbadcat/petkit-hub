name: PetKit Hub
slug: petkit_hub
version: "0.1.0"
description: Multi-account PetKit hub with a plugin system; publishes devices to HA via MQTT discovery
url: https://github.com/derg/petkit-hub
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:cat
panel_title: PetKit Hub
hassio_api: true
homeassistant_api: true
services:
  - mqtt:need
options:
  log_level: info
schema:
  log_level: list(debug|info|warning|error)?
